name: skills-manager Cask Auto Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch latest skills-manager release
        id: fetch-release
        run: |
          LATEST_RELEASE=$(curl -sL https://api.github.com/repos/xingkongliang/skills-manager/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "LATEST_VERSION=$LATEST_RELEASE" >> $GITHUB_ENV
          
          CURRENT_VERSION=$(grep -oE 'version "[0-9\.]+"' Casks/skills-manager.rb | cut -d '"' -f 2)
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          
          if [ "$LATEST_RELEASE" != "$CURRENT_VERSION" ]; then
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          else
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          fi

      - name: Update Cask file
        if: env.UPDATE_NEEDED == 'true'
        run: |
          VERSION=${{ env.LATEST_VERSION }}
          
          echo "Updating to version: $VERSION"
          
          ARM_URL="https://github.com/xingkongliang/skills-manager/releases/download/v${VERSION}/skills-manager_${VERSION}_aarch64.dmg"
          INTEL_URL="https://github.com/xingkongliang/skills-manager/releases/download/v${VERSION}/skills-manager_${VERSION}_x64.dmg"
          
          ARM_SHA=$(curl -sL $ARM_URL | sha256sum | awk '{print $1}')
          INTEL_SHA=$(curl -sL $INTEL_URL | sha256sum | awk '{print $1}')
          
          echo "New ARM SHA: $ARM_SHA"
          echo "New Intel SHA: $INTEL_SHA"
          
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/skills-manager.rb
          sed -i "s/sha256 arm:   \".*\",/sha256 arm:   \"${ARM_SHA}\",/" Casks/skills-manager.rb
          sed -i "s/         intel: \".*\"/         intel: \"${INTEL_SHA}\"/" Casks/skills-manager.rb

      - name: Commit and Push
        if: env.UPDATE_NEEDED == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(skills-manager): bump version to ${{ env.LATEST_VERSION }}"
          file_pattern: "Casks/skills-manager.rb"
