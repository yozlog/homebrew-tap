name: dragterm Formula Auto Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run update script
        run: python3 scripts/update_dragterm.py

      - name: Commit and Push changes
        if: env.UPDATE_NEEDED == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(dragterm): bump version to ${{ env.LATEST_VERSION }}"
          file_pattern: "Formula/dragterm.rb"
